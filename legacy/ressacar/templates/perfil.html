<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>O Meu Perfil</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="reserva-body">
  <div class="container mt-5">
    <h2 class="text-center mb-4 text-white">O Meu Perfil</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show text-center" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <ul class="nav nav-tabs mb-4" id="perfilTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="dados-tab" data-bs-toggle="tab" data-bs-target="#dados" type="button" role="tab">Dados Pessoais</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="password-tab" data-bs-toggle="tab" data-bs-target="#password" type="button" role="tab">Alterar Palavra-passe</button>
      </li>
    </ul>

    <div class="tab-content">
      <!-- Aba Dados Pessoais -->
      <div class="tab-pane fade show active" id="dados" role="tabpanel">
        <form method="POST" action="{{ url_for('perfil') }}" class="bg-dark text-white p-4 rounded shadow" novalidate>
          <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" name="nome" value="{{ cliente.nome }}" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ cliente.email }}" required>
          </div>
          <div class="mb-3">
            <label for="telefone" class="form-label">Telefone</label>
            <input type="tel" class="form-control" id="telefone" name="telefone" value="{{ cliente.telefone }}" pattern="[0-9]{9}" placeholder="Ex: 912345678">
          </div>
          <button type="submit" class="btn btn-roxo w-100">Guardar Alterações</button>
        </form>
      </div>

      <!-- Aba Alterar Password -->
      <div class="tab-pane fade" id="password" role="tabpanel">
        <form method="POST" action="{{ url_for('alterar_password') }}" class="bg-dark text-white p-4 rounded shadow mt-3" novalidate>
          <div class="mb-3">
            <label for="password_atual" class="form-label">Palavra-passe atual</label>
            <input type="password" class="form-control" id="password_atual" name="password_atual" required>
          </div>
          <div class="mb-3">
            <label for="nova_password" class="form-label">Nova palavra-passe</label>
            <input type="password" class="form-control" id="nova_password" name="nova_password" required>
          </div>
          <div class="mb-3">
            <label for="confirmar_password" class="form-label">Confirmar nova palavra-passe</label>
            <input type="password" class="form-control" id="confirmar_password" name="confirmar_password" required>
          </div>
          <button type="submit" class="btn btn-roxo w-100">Alterar Palavra-passe</button>
        </form>
      </div>
    </div>

    <div class="text-center mt-4">
      <a href="{{ url_for('index') }}" class="text-decoration-none text-light">
        <i class="bi bi-arrow-left"></i> Voltar à página inicial
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
