<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Reserva de Veículo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="reserva-body">

<div class="container">
  <h2 class="text-center fw-bold mb-4">Reserva: {{ veiculo.brand }} {{ veiculo.model }}</h2>
  
  <div class="row">
    <!-- Formulário -->
    <div class="col-md-7">
      <div class="reserva-card">
        <form method="POST">
          <div class="mb-3">
            <label for="data_inicio">Data de Início</label>
            <input type="date" id="data_inicio" name="data_inicio" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="data_fim">Data de Fim</label>
            <input type="date" id="data_fim" name="data_fim" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="metodo_pagamento">Método de Pagamento</label>
            <select id="metodo_pagamento" name="metodo_pagamento" class="form-select" required>
              <option value="" disabled selected>Seleciona uma opção</option>
              <option value="cartao">Cartão de Crédito</option>
              <option value="mbway">MB Way</option>
              <option value="transferencia">Transferência Bancária</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="observacoes">Observações (opcional)</label>
            <textarea id="observacoes" name="observacoes" class="form-control" rows="3" placeholder="Algo mais que devamos saber?"></textarea>
          </div>

          <div class="form-check mb-4">
            <input type="checkbox" class="form-check-input" id="termos" required>
            <label class="form-check-label" for="termos">Aceito os <a href="#">termos e condições</a></label>
          </div>

          <button type="submit" class="btn btn-roxo w-100">Confirmar Reserva</button>
        </form>
      </div>
    </div>

    <!-- Resumo -->
    <div class="col-md-5 mt-4 mt-md-0">
      <div class="resumo-card text-center">
        <img src="{{ url_for('static', filename='images/' + veiculo.imagens.split(',')[0]) }}" alt="Imagem do veículo" class="img-fluid rounded mb-3">
        <h4>{{ veiculo.brand }} {{ veiculo.model }}</h4>
        <p class="text-muted">{{ veiculo.type|capitalize }}</p>
        <p><strong>{{ veiculo.price_per_day }} €</strong> / dia</p>
        <hr class="border-secondary">
        <p class="small text-muted">O valor total será calculado após seleção das datas.</p>
      </div>
    </div>
  </div>

  <div class="text-center mt-4">
    <a href="{{ url_for('index') }}" class="text-decoration-none text-light">
      <i class="bi bi-arrow-left"></i> Voltar à página inicial
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
