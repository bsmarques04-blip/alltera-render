<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Coleção | MotoCarGo</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

  <div class="container py-5">
    <h1 class="text-center mb-4">A Nossa Coleção</h1>


    <form method="get" class="row g-3 mb-4">
      <div class="col-md-4">
        <select class="form-select" name="tipo" onchange="this.form.submit()">
          <option value="">Todos os Tipos</option>
          <option value="CARRO" {% if tipo_selecionado == 'CARRO' %}selected{% endif %}>Carros</option>
          <option value="MOTA" {% if tipo_selecionado == 'MOTA' %}selected{% endif %}>Motas</option>
        </select>
      </div>
      <div class="col-md-4">
        <select class="form-select" name="categoria" onchange="this.form.submit()">
          <option value="">Todas as Categorias</option>
          {% for c in categorias %}
          <option value="{{ c.id }}" {% if categoria_selecionada == c.id|string %}selected{% endif %}>{{ c.nome }}</option>
          {% endfor %}
        </select>
      </div>
    </form>

    <div class="row row-cols-1 row-cols-md-3 g-4">
      {% for v in veiculos %}
      <div class="col">
        <div class="card h-100 bg-light text-dark">
          <img src="{{ url_for('static', filename='images/' + v.imagens.split(',')[0]) }}" class="card-img-top" alt="{{ v.model }}">
          <div class="card-body">
            <h5 class="card-title">{{ v.brand }} {{ v.model }}</h5>
            <p class="card-text">{{ v.price_per_day }} € / dia</p>
            <a href="{{ url_for('reservar_veiculo', veiculo_id=v.id) }}" class="btn btn-primary">Reservar</a>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>

    {% if not veiculos %}
      <p class="text-center mt-4">Nenhum veículo encontrado com os filtros selecionados.</p>
    {% endif %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
