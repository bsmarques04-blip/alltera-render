<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Adicionar Novo Veículo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-dark text-white py-5">

  <div class="container">
    <h1 class="mb-4 fw-bold">Adicionar Novo Veículo</h1>

    <form method="POST" enctype="multipart/form-data" class="bg-black p-4 rounded shadow-sm border border-secondary">
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="tipo" class="form-label">Tipo:</label>
          <select name="tipo" class="form-select" required>
            <option value="carro">Carro</option>
            <option value="mota">Mota</option>
          </select>
        </div>
        <div class="col-md-6">
          <label for="categoria" class="form-label">Categoria:</label>
          <select name="categoria" class="form-select" required>
            {% for c in categorias %}
              <option value="{{ c.id }}">{{ c.nome }}</option>
            {% endfor %}
          </select>

        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="brand" class="form-label">Marca:</label>
          <input type="text" name="brand" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label for="model" class="form-label">Modelo:</label>
          <input type="text" name="model" class="form-control" required>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="ano" class="form-label">Ano:</label>
          <input type="number" name="ano" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label for="preco" class="form-label">Preço por dia (€):</label>
          <input type="number" step="0.01" name="price_per_day" class="form-control" required>
        </div>
      </div>

      <div class="mb-3">
        <label for="descricao" class="form-label">Descrição Detalhada:</label>
        <textarea name="descricao" class="form-control" rows="5" placeholder="Inclui informações como desempenho, características, conforto, etc."></textarea>
      </div>

      <div class="mb-4">
        <label for="imagens" class="form-label">Imagens (podes enviar mais que uma):</label>
        <input type="file" name="imagens" class="form-control" multiple required>
      </div>

      <div class="d-flex justify-content-between">
        <a href="{{ url_for('admin_panel') }}" class="btn btn-outline-light">← Voltar ao painel</a>
        <button type="submit" class="btn btn-primary">Adicionar Veículo</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
