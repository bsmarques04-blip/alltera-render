<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Adicionar Veículo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <h1>Adicionar Novo Veículo</h1>

  <form method="POST" enctype="multipart/form-data">
    <label>Tipo:</label>
    <select name="type">
      <option value="CARRO">Carro</option>
      <option value="MOTA">Mota</option>
    </select><br><br>

    <label>Marca:</label>
    <input type="text" name="brand" required><br><br>

    <label>Modelo:</label>
    <input type="text" name="model" required><br><br>

    <label>Ano:</label>
    <input type="number" name="year" required><br><br>

    <label>Preço por dia (€):</label>
    <input type="number" step="0.01" name="price_per_day" required><br><br>

    <label>Categoria:</label>
    <select name="categoria">
      {% for cat in categorias %}
        <option value="{{ cat.id }}">{{ cat.nome }}</option>
      {% endfor %}
    </select><br><br>

    <label>Imagens (podes enviar mais que uma):</label>
    <input type="file" name="imagens" multiple><br><br>

    <button type="submit">Adicionar</button>
  </form>

  <br>
  <a href="{{ url_for('admin_panel') }}">← Voltar ao painel</a>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
