{% extends "base.html" %}
{% block title %}Reserve Car{% endblock %}
{% block content %}
<main class="container my-5">
  <h2 class="mb-4">Reserve {{ car.title }}</h2>
  <div class="card p-4">
    <p><strong>Description:</strong> {{ car.description }}</p>
    <p><strong>Price per day:</strong> ${{ "%.2f"|format(car.price_per_day) }}</p>
      <form method="POST" action="{{ url_for('reserve_car', car_id=car.id) }}">
      <div class="mb-3">
        <label for="start_date" class="form-label">Start Date</label>
        <input type="date" class="form-control" id="start_date" name="start_date" required>
      </div>
      <div class="mb-3">
        <label for="end_date" class="form-label">End Date</label>
        <input type="date" class="form-control" id="end_date" name="end_date" required>
      </div>
      <div class="mb-3">
        <label for="payment_method" class="form-label">Select Payment Method</label>
        <select class="form-select" id="payment_method" name="payment_method" required>
          <option value="credit_card" selected>Credit Card</option>
        </select>
      </div>

      <div id="payment_details">

        <div id="credit_card_fields">
          <div class="mb-3">
            <label for="cc_number" class="form-label">Card Number</label>
            <input type="text" class="form-control" id="cc_number" name="cc_number" maxlength="19" placeholder="1234 5678 9012 3456" required>
          </div>
          <div class="mb-3">
            <label for="cc_expiry" class="form-label">Expiry Date</label>
            <input type="month" class="form-control" id="cc_expiry" name="cc_expiry" required>
          </div>
          <div class="mb-3">
            <label for="cc_cvv" class="form-label">CVV</label>
            <input type="text" class="form-control" id="cc_cvv" name="cc_cvv" maxlength="4" placeholder="123" required>
          </div>
        </div>

      </div>

      <button type="submit" class="btn btn-primary">Confirm Reservation</button>
    </form>
  </div>
</main>
{% endblock %}
