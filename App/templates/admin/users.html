{% extends "base.html" %}
{% block title %}Admin - Gestão de Utilizadores{% endblock %}
{% block content %}
  <main class="container my-5">
    <h2 class="text-center mb-4">Gestão de Utilizadores</h2>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Email</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ user.id }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>
            <form method="POST" action="{{ url_for('admin_users') }}" onsubmit="return confirm('Tem certeza que deseja eliminar este utilizador?');">
              <input type="hidden" name="user_id" value="{{ user.id }}">
              <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mt-3">Voltar ao Dashboard</a>
  </main>
{% endblock %}
