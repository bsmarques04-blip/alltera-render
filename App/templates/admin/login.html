{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
  <main class="container my-5">
    <h2 class="text-center mb-4">Admin Login</h2>
    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="mb-3">
        <label for="email" class="form-label">Email (admin@gmail.com)</label>
        <input type="email" class="form-control" id="email" name="email" required value="admin@gmail.com">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Palavra-passe (secret)</label>
        <input type="password" class="form-control" id="password" name="password" required value="secret">
      </div>
      <button type="submit" class="btn btn-primary">Entrar</button>
    </form>
  </main>
{% endblock %}
