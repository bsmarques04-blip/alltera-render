{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
  <main class="container my-5" style="max-width:400px;">
    <h2 class="text-center mb-4">Login</h2>
    <form method="POST">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" id="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" name="password" id="password" class="form-control" required>
        <div class="form-check mt-2">
          <input class="form-check-input" type="checkbox" id="showPasswordLogin" onclick="togglePassword('password', 'showPasswordLogin')">
          <label class="form-check-label" for="showPasswordLogin">Mostrar senha</label>
        </div>
      </div>
      <button type="submit" class="btn btn-gold w-100">Login</button>
    </form>
    <p class="text-center mt-3">Ainda não tens conta? <a href="{{ url_for('signup') }}">Registar</a></p>
  </main>
  <script>
    function togglePassword(passwordFieldId, checkboxId) {
      const passwordField = document.getElementById(passwordFieldId);
      const checkbox = document.getElementById(checkboxId);
      if (checkbox.checked) {
        passwordField.type = "text";
      } else {
        passwordField.type = "password";
      }
    }
  </script>
{% endblock %}
